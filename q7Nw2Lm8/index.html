<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>フル配信はこちら</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100vh; }
    video { width: 100%; height: 100vh; object-fit: cover; }
    .sound-btn {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      color: #000;
      border: 2px solid #000;
      border-radius: 9999px;
      padding: 14px 36px;
      font-size: 19px;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 30;
    }
  </style>
</head>
<body>

  <video id="myVideo" autoplay muted playsinline loop>
    <source src="https://files.catbox.moe/99nbyc.mp4" type="video/mp4">
  </video>

  <button id="soundBtn" class="sound-btn flex items-center gap-2">
    🔊 音声ON
  </button>

  <!-- ポップアップ -->
  <div id="overlay" style="display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:50;">
    <div class="bg-white/10 backdrop-blur-md rounded-3xl px-8 py-10 text-center max-w-[320px] w-full mx-4 border border-white/30">
      <p id="deliveryTime" class="text-white text-2xl font-bold mb-3"></p>
      <p id="randomText" class="text-white/70 text-sm mb-8"></p>
      <div id="countdown" class="text-white text-lg font-medium mb-8">6秒後に移動</div>
      <button onclick="goToAffiliate()" class="w-full bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold text-xl py-5 rounded-3xl shadow-lg">今すぐ見る</button>
    </div>
  </div>

  <script>
    const video = document.getElementById('myVideo');
    const soundBtn = document.getElementById('soundBtn');
    const overlay = document.getElementById('overlay');
    const countdownEl = document.getElementById('countdown');
    const deliveryTimeEl = document.getElementById('deliveryTime');
    const randomText = document.getElementById('randomText');

    const AFFILIATE_URL = "https://twimg.you/s/zep8w1yz";

    // 開いた時刻から15分後を表示
    function setDeliveryTime() {
      const now = new Date();
      now.setMinutes(now.getMinutes() + 15);

      const hour = now.getHours().toString().padStart(2, '0');
      const minute = now.getMinutes().toString().padStart(2, '0');

      deliveryTimeEl.textContent = `${hour}:${minute}より配信開始`;
    }

    // ランダム名前
    const names = ["miu", "りん", "あや", "しおり", "はづき", "まな", "えま", "かな", "ゆうり"];
    function setRandomName() {
      const randomName = names[Math.floor(Math.random() * names.length)];
      randomText.innerHTML = `(${randomName}で検索 🔎)`;
    }

    let isMuted = true;
    soundBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      video.muted = isMuted;
      soundBtn.innerHTML = isMuted ? `🔊 音声ON` : `🔇 音声OFF`;
    });

    // 動画が再生開始されてから7秒後にポップアップを表示
    video.addEventListener('play', () => {
      if (overlay.style.display !== 'flex') {
        setTimeout(() => {
          setDeliveryTime();
          setRandomName();
          overlay.style.display = 'flex';
          startCountdown();
        }, 7000);
      }
    }, { once: true });

    let timeLeft = 6;
    function startCountdown() {
      const timer = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = `${timeLeft}秒後に移動`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          window.location.href = AFFILIATE_URL;
        }
      }, 1000);
    }

    window.goToAffiliate = () => window.location.href = AFFILIATE_URL;
  </script>
</body>
</html>
