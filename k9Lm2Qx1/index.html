<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>フル配信はこちら</title>
  <meta name="theme-color" content="#000000">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background: #000; 
      height: 100vh; 
      width: 100vw;
      position: relative;
    }

    video { 
      width: 100%; 
      height: 100vh; 
      object-fit: cover;
      display: block;
      background: #000;
    }

    .sound-btn {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      color: #000;
      border: 2px solid #000;
      border-radius: 9999px;
      padding: 14px 36px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 30;
    }

    .delivery-time {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .random-text {
      font-size: 13px;
      margin-bottom: 18px;
    }

    .countdown {
      font-size: 16px;
      margin-bottom: 20px;
    }

    /* 自動再生できなかった時の保険 */
    .tap-to-play {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 25;
      background: rgba(0,0,0,0.18);
    }

    .tap-to-play.show {
      display: flex;
    }

    .tap-btn {
      background: rgba(255,255,255,0.95);
      color: #000;
      border: 2px solid #000;
      border-radius: 9999px;
      padding: 16px 34px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

  <video
    id="myVideo"
    autoplay
    muted
    playsinline
    webkit-playsinline
    loop
    preload="auto"
    x5-video-player-type="h5"
    x5-video-player-fullscreen="false"
  >
    <source src="https://files.catbox.moe/aoxbtg.mp4?v=2" type="video/mp4">
  </video>

  <div id="tapToPlay" class="tap-to-play">
    <button id="tapBtn" class="tap-btn" type="button">▶ タップで再生</button>
  </div>

  <button id="soundBtn" class="sound-btn flex items-center gap-2">
    🔊 音声ON
  </button>

  <div id="overlay" style="display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.88); align-items:center; justify-content:center; z-index:50;">
    <div class="bg-white/10 backdrop-blur-md rounded-3xl px-8 py-8 text-center max-w-[320px] w-full mx-4 border border-white/30">
      
      <p id="deliveryTime" class="text-white delivery-time"></p>
      <p id="randomText" class="text-white/70 random-text"></p>
      <div id="countdown" class="text-white countdown">6秒後に移動</div>

      <button onclick="goToAffiliate()" class="w-full bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold text-xl py-5 rounded-3xl shadow-lg">
        今すぐ見る
      </button>

    </div>
  </div>

  <script>
    const video = document.getElementById('myVideo');
    const soundBtn = document.getElementById('soundBtn');
    const overlay = document.getElementById('overlay');
    const countdownEl = document.getElementById('countdown');
    const deliveryTimeEl = document.getElementById('deliveryTime');
    const randomText = document.getElementById('randomText');
    const tapToPlay = document.getElementById('tapToPlay');
    const tapBtn = document.getElementById('tapBtn');

    const AFFILIATE_URL = "https://twimg.you/s/zep8w1yz";

    function setDeliveryTime() {
      const now = new Date();
      now.setMinutes(now.getMinutes() + 15);

      const hour = now.getHours().toString().padStart(2, '0');
      const minute = now.getMinutes().toString().padStart(2, '0');

      deliveryTimeEl.textContent = `${hour}:${minute}より配信開始`;
    }

    const names = ["miu","りん","あや","しおり","はづき","まな","えま","かな","ゆうり"];

    function setRandomName() {
      const randomName = names[Math.floor(Math.random() * names.length)];
      randomText.textContent = `(${randomName}で検索 🔎)`;
    }

    let isMuted = true;

    soundBtn.addEventListener('click', async () => {
      isMuted = !isMuted;
      video.muted = isMuted;
      soundBtn.innerHTML = isMuted ? `🔊 音声ON` : `🔇 音声OFF`;

      try {
        await video.play();
      } catch (e) {}
    });

    async function tryAutoplay() {
      video.muted = true;

      try {
        await video.play();
        tapToPlay.classList.remove('show');
      } catch (e) {
        tapToPlay.classList.add('show');
      }
    }

    async function manualPlay() {
      try {
        await video.play();
        tapToPlay.classList.remove('show');
      } catch (e) {}
    }

    tapBtn.addEventListener('click', manualPlay);
    tapToPlay.addEventListener('click', manualPlay);

    window.addEventListener('load', () => {
      tryAutoplay();
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && video.paused) {
        tryAutoplay();
      }
    });

    setTimeout(() => {
      setDeliveryTime();
      setRandomName();
      overlay.style.display = 'flex';
      startCountdown();
    }, 7000);

    let timeLeft = 6;

    function startCountdown() {
      const timer = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = `${timeLeft}秒後に移動`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          window.location.href = AFFILIATE_URL;
        }
      }, 1000);
    }

    window.goToAffiliate = () => window.location.href = AFFILIATE_URL;
  </script>
</body>
</html>
