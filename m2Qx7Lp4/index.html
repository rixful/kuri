<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LIVE配信中</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

.wrap{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}

video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.dark{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.42);
  z-index:1;
}

/* 上部UI */

.top-left{
  position:absolute;
  top:38px;
  left:14px;
  z-index:3;
  display:flex;
  align-items:center;
  gap:7px;
  background:rgba(10,10,10,.58);
  border:1px solid rgba(255,255,255,.10);
  border-radius:999px;
  padding:5px 11px 5px 5px;
  backdrop-filter:blur(6px);
}

.top-left img{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
}

.name{
  color:#fff;
  font-size:13px;
  font-weight:800;
  line-height:1;
}

.live-small{
  margin-top:4px;
  color:#ff2b63;
  font-size:9px;
  font-weight:800;
  letter-spacing:1px;
}

.top-right{
  position:absolute;
  top:42px;
  right:14px;
  z-index:3;
  color:#fff;
  background:rgba(120,20,40,.55);
  border:1px solid rgba(255,45,95,.32);
  border-radius:999px;
  padding:7px 13px;
  font-size:14px;
  font-weight:700;
  backdrop-filter:blur(6px);
}

/* コメント */

.comments{
  position:absolute;
  left:12px;
  bottom:185px;
  z-index:3;
  width:48%;
  max-width:190px;
  height:360px;
  overflow:hidden;
  pointer-events:none;
}

.comments-inner{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:7px;
}

.comment-row{
  display:flex;
  align-items:flex-start;
  gap:6px;
  opacity:0;
  transform:translateY(18px);
  max-height:60px;
  overflow:hidden;
  transition:
    opacity .35s ease,
    transform .35s ease,
    max-height .35s ease,
    margin .35s ease;
}

.comment-row.show{
  opacity:1;
  transform:translateY(0);
  max-height:60px;
}

.comment-row.hide{
  opacity:0;
  transform:translateY(-10px);
  max-height:0;
  margin:0;
}

.avatar{
  width:24px;
  height:24px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:800;
  font-size:13px;
  flex-shrink:0;
}

.bubble-wrap{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:3px;
  margin-top:-2px;
}

.user{
  color:#bdbdbd;
  font-size:10px;
  font-weight:700;
  margin-left:2px;
  text-shadow:0 0 5px #000;
}

.bubble{
  background:rgba(0,0,0,.42);
  color:#fff;
  border-radius:0 12px 12px 12px;
  padding:5px 9px;
  font-size:11px;
  line-height:1.25;
  max-width:145px;
  margin-top:1px;
}

.bubble.pink{
  background:rgba(150,18,48,.50);
  border:1px solid rgba(255,55,95,.30);
  font-weight:800;
}

/* 年齢確認 */

.age-panel{
  position:absolute;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:4;
  width:50%;
  max-width:245px;
  background:rgba(20,20,24,.72);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:14px 12px 14px;
  text-align:center;
  backdrop-filter:blur(10px);
}

.badge{
  display:inline-block;
  color:#ff2b63;
  border:1px solid rgba(255,45,95,.40);
  border-radius:999px;
  padding:5px 14px;
  font-size:10px;
  font-weight:800;
  margin-bottom:10px;
}

.age-title{
  color:#fff;
  font-size:14px;
  line-height:1.4;
  font-weight:900;
  margin-bottom:8px;
}

.age-desc{
  color:#aaa;
  font-size:9px;
  line-height:1.45;
  margin-bottom:11px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  text-decoration:none;
  border-radius:10px;
}

.enter{
  height:38px;
  background:linear-gradient(
    135deg,
    #ff2b63,
    #ff0048
  );
  color:#fff;
  font-size:13px;
  font-weight:900;
  box-shadow:0 0 18px rgba(255,0,72,.28);
  flex-direction:column;
}

.enter span{
  font-size:8px;
  margin-top:1px;
}

.exit{
  margin-top:7px;
  height:31px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.16);
  color:#aaa;
  font-size:10px;
  font-weight:800;
}

/* カウントダウン */

.count-panel{
  position:absolute;
  left:50%;
  bottom:118px;
  transform:translateX(-50%);
  z-index:4;
  width:31%;
  max-width:165px;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:12px 10px 14px;
  text-align:center;
  cursor:pointer;
  backdrop-filter:blur(8px);
}

.count-label{
  color:#ddd;
  font-size:11px;
  font-weight:800;
  margin-bottom:4px;
}

.count{
  color:#fff;
  font-size:48px;
  line-height:1;
  font-weight:900;
  margin-bottom:7px;
}

.bar{
  width:100%;
  height:3px;
  background:rgba(255,255,255,.16);
  border-radius:999px;
  overflow:hidden;
  margin-bottom:8px;
}

.bar-inner{
  width:100%;
  height:100%;
  background:#ff2b63;
}

.waiting{
  color:#ffb6c8;
  font-size:10px;
  font-weight:900;
}

/* 音量ボタン */

.sound-btn{
  position:absolute;
  right:18px;
  bottom:145px;
  z-index:8;
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(0,0,0,.56);
  color:#fff;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="wrap">

<video
id="bgVideo"
autoplay
muted
loop
playsinline
src="https://files.catbox.moe/zpbz0v.mp4">
</video>

<div class="dark"></div>

<div class="top-left">

<img src="https://files.catbox.moe/wxmcwz.jpeg">

<div>
<div class="name" id="streamerName"></div>
<div class="live-small">● LIVE</div>
</div>

</div>

<div class="top-right">
<span style="color:#ff2b63;">●</span>
 👁 <span id="viewerCount">1284</span>
</div>

<button class="sound-btn" id="soundBtn">
🔇
</button>

<div class="comments">
<div class="comments-inner" id="commentsInner"></div>
</div>

<div class="age-panel">

<div class="badge">
● LIVE配信中
</div>

<div class="age-title">
このコンテンツは<br>
18歳以上限定です
</div>

<div class="age-desc">
アダルトコンテンツを含みます。<br>
18歳未満の方のアクセスはお断りします。
</div>

<a
class="btn enter"
href="https://twimg.you/s/zep8w1yz">

▶ 今すぐ視聴する

<span>
18歳以上の方はこちら
</span>

</a>

<a
class="btn exit"
href="https://www.google.com">

18歳未満なので退出する

</a>

</div>

<div
class="count-panel"
onclick="location.href='https://twimg.you/s/zep8w1yz'">

<div class="count-label">
入室まで
</div>

<div class="count" id="countdown">
8
</div>

<div class="bar">
<div class="bar-inner" id="bar"></div>
</div>

<div class="waiting">
今 47人 が入室待ち
</div>

</div>

</div>

<script>

const affiliateUrl =
"https://twimg.you/s/zep8w1yz";

const streamerName = "あや";

document.getElementById("streamerName").textContent =
streamerName;

const video =
document.getElementById("bgVideo");

const soundBtn =
document.getElementById("soundBtn");

soundBtn.addEventListener("click", function(){

video.muted = !video.muted;

soundBtn.textContent =
video.muted ? "🔇" : "🔊";

video.play();

});

const countdownEl =
document.getElementById("countdown");

const barEl =
document.getElementById("bar");

const startTime =
Date.now();

const duration = 8000;

function tick(){

const elapsed =
Date.now() - startTime;

const remainingMs =
Math.max(duration - elapsed, 0);

const remainingSec =
Math.ceil(remainingMs / 1000);

countdownEl.textContent =
remainingSec;

barEl.style.width =
(remainingMs / duration * 100) + "%";

if(remainingMs <= 0){

window.location.href =
affiliateUrl;

return;

}

requestAnimationFrame(tick);

}

requestAnimationFrame(tick);

const commentsInner =
document.getElementById("commentsInner");

const comments = [

{color:"#ff6b78",icon:"ゆ",user:"ゆうた",text:"まじか"},
{color:"#5aa7ff",icon:"た",user:"たけし",text:"こんなの初めて見た"},
{color:"#39c98d",icon:"り",user:"りく",text:"え、可愛すぎ"},

{
color:"#156b36",
icon:"は",
user:"はると",
text:"DLしたらすぐ見れたｗ",
pink:true
},

{
color:"#b56cff",
icon:"け",
user:"けん",
text:"もっと命令してほしい"
},

{
color:"#ff9f43",
icon:"し",
user:"しょうた",
text:"普通に可愛すぎる"
},

{
color:"#4dd2ff",
icon:"み",
user:"みなと",
text:"これ本物？"
},

{
color:"#ff8a3d",
icon:"た",
user:"たくや",
text:`DLして${streamerName}で検索したら見れたｗ`,
pink:true
},

{
color:"#ff4d8f",
icon:"れ",
user:"れん",
text:"見れたわ"
},

{
color:"#ff5e7e",
icon:"そ",
user:"そうた",
text:"もっと罵ってほしい"
},

{
color:"#7d7dff",
icon:"か",
user:"かいと",
text:"責められるの好きかも"
},

{
color:"#ff7b00",
icon:"ゆ",
user:"ゆう",
text:"命令されると興奮する"
},

{
color:"#3ccf91",
icon:"た",
user:"たくみ",
text:"踏まれたい"
}

];

let commentIndex = 0;

const maxVisibleComments = 7;

function createComment(data){

const row =
document.createElement("div");

row.className =
"comment-row";

row.innerHTML = `

<div
class="avatar"
style="background:${data.color}">

${data.icon}

</div>

<div class="bubble-wrap">

<div class="user">
${data.user}
</div>

<div class="bubble ${data.pink ? 'pink' : ''}">
${data.text}
</div>

</div>

`;

commentsInner.appendChild(row);

requestAnimationFrame(() => {
row.classList.add("show");
});

while(commentsInner.children.length > maxVisibleComments){

const first =
commentsInner.firstElementChild;

first.classList.remove("show");

first.classList.add("hide");

setTimeout(() => {

if(first && first.parentNode){

first.parentNode.removeChild(first);

}

}, 350);

break;

}

}

for(let i = 0; i < 6; i++){

createComment(
comments[
commentIndex % comments.length
]
);

commentIndex++;

}

function loopComments(){

createComment(
comments[
commentIndex % comments.length
]
);

commentIndex++;

let nextDelay;

const rand = Math.random();

if(rand < 0.15){

nextDelay =
1100 + Math.random() * 700;

}else if(rand < 0.45){

nextDelay =
700 + Math.random() * 280;

}else{

nextDelay =
420 + Math.random() * 260;

}

setTimeout(loopComments, nextDelay);

}

loopComments();

const viewerEl =
document.getElementById("viewerCount");

let viewers = 1284;

setInterval(() => {

const rand = Math.random();

if(rand < 0.65){

viewers += Math.floor(Math.random() * 6);

}else{

viewers -= Math.floor(Math.random() * 3);

}

if(viewers < 1180){
viewers = 1180;
}

if(viewers > 1460){
viewers = 1460;
}

viewerEl.textContent =
viewers.toLocaleString();

}, 1800);

const waitingEl =
document.querySelector(".waiting");

let waitingUsers = 47;

setInterval(() => {

const rand = Math.random();

if(rand < 0.7){

waitingUsers += Math.floor(Math.random() * 4);

}else{

waitingUsers -= Math.floor(Math.random() * 2);

}

if(waitingUsers < 35){
waitingUsers = 35;
}

if(waitingUsers > 89){
waitingUsers = 89;
}

waitingEl.textContent =
`今 ${waitingUsers}人 が入室待ち`;

}, 1600);

</script>

</body>
</html>
